# Default YAML
# Line wrap recommended
# Don't forget to change variables every QEMU update!
name: Build Stable branch

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish release assets
        required: false
        default: false
        type: boolean
  
jobs:
   MINGW64-Windows:
   
     runs-on: windows-latest      
     env:
      buildver: 'head-da6c4fe'
      qemu_ref: 'da6c4fe60fee30dd77267764d55b38af9cb89d4b'
      qemu_src_dir: 'qemu-head'
      primary_patch: '00-qemu110x-mesa-glide.patch'
      mspkg: 'mingw-w64-x86_64'
      branch: ${{ github.ref_name }}
      
     steps:  
     - name: Checkout repo
       uses: actions/checkout@v4
       
     - name: Setup MSYS2
       uses: msys2/setup-msys2@v2
       with:
         msystem: MINGW64
         update: true
         install: >-
          base 
          base-devel
          dos2unix
          gcc
          git
          make
          ninja
          patch
          python 
          rsync
          wget
          zstd
          ${{ env.mspkg }}-python
          ${{ env.mspkg }}-python-distlib
          ${{ env.mspkg }}-python-pip
          ${{ env.mspkg }}-python-setuptools
          ${{ env.mspkg }}-python-sphinx
          ${{ env.mspkg }}-python-sphinx_rtd_theme
          ${{ env.mspkg }}-angleproject
          ${{ env.mspkg }}-autotools
          ${{ env.mspkg }}-binutils
          ${{ env.mspkg }}-toolchain
          ${{ env.mspkg }}-tools
          ${{ env.mspkg }}-7zip
          ${{ env.mspkg }}-cairo
          ${{ env.mspkg }}-capstone
          ${{ env.mspkg }}-curl
          ${{ env.mspkg }}-cyrus-sasl
          ${{ env.mspkg }}-dtc
          ${{ env.mspkg }}-expat
          ${{ env.mspkg }}-fontconfig
          ${{ env.mspkg }}-freetype
          ${{ env.mspkg }}-gcc
          ${{ env.mspkg }}-gdk-pixbuf2
          ${{ env.mspkg }}-gettext-runtime
          ${{ env.mspkg }}-gettext-tools
          ${{ env.mspkg }}-glib2
          ${{ env.mspkg }}-gnutls
          ${{ env.mspkg }}-gst-libav
          ${{ env.mspkg }}-gst-plugins-ugly
          ${{ env.mspkg }}-gtk3
          ${{ env.mspkg }}-gtk-vnc
          ${{ env.mspkg }}-jack2
          ${{ env.mspkg }}-libcacard
          ${{ env.mspkg }}-libgcrypt
          ${{ env.mspkg }}-libepoxy
          ${{ env.mspkg }}-libnfs
          ${{ env.mspkg }}-libpng
          ${{ env.mspkg }}-libslirp
          ${{ env.mspkg }}-libssh
          ${{ env.mspkg }}-libssh2
          ${{ env.mspkg }}-libtasn1
          ${{ env.mspkg }}-libusb
          ${{ env.mspkg }}-libxml2
          ${{ env.mspkg }}-lz4
          ${{ env.mspkg }}-lzo2
          ${{ env.mspkg }}-meson
          ${{ env.mspkg }}-msitools
          ${{ env.mspkg }}-ncurses
          ${{ env.mspkg }}-nettle
          ${{ env.mspkg }}-ninja
          ${{ env.mspkg }}-pcre2
          ${{ env.mspkg }}-pixman
          ${{ env.mspkg }}-pkgconf
          ${{ env.mspkg }}-pulseaudio
          ${{ env.mspkg }}-SDL2
          ${{ env.mspkg }}-SDL2_image
          ${{ env.mspkg }}-SDL2_sound
          ${{ env.mspkg }}-snappy
          ${{ env.mspkg }}-spice
          ${{ env.mspkg }}-spice-gtk
          ${{ env.mspkg }}-spice-protocol
          ${{ env.mspkg }}-usbredir
          ${{ env.mspkg }}-xz
          ${{ env.mspkg }}-zlib
          ${{ env.mspkg }}-zstd
          
     - name: Fetching QEMU source
       continue-on-error: true
       shell: msys2 {0}
       run:  |
        echo "Cloning QEMU source"
        git clone --depth 1 https://github.com/qemu/qemu.git "${{ env.qemu_src_dir }}"
        cd "${{ env.qemu_src_dir }}"
        git fetch --depth 1 origin "${{ env.qemu_ref }}"
        git checkout "${{ env.qemu_ref }}"
        echo "Pinned QEMU commit: $(git rev-parse --short HEAD)"

     - name: Patching build
       shell: msys2 {0}
       run:  |
        echo "Applying qemu-3dfx patch stack"
        bash scripts/apply_qemu_patches.sh \
          --src-dir "${{ env.qemu_src_dir }}" \
          --primary-patch "${{ env.primary_patch }}" \
          --with-qemu-exp

     - name: Build local virglrenderer package
       shell: msys2 {0}
       run: |
        cd virgil3d/MINGW-packages
        dos2unix PKGBUILD 000*.patch
        makepkg-mingw -sCLfc --noconfirm
        pacman -U --noconfirm mingw-w64-*.pkg.tar.zst
        VIRGL_HDR="${MINGW_PREFIX}/include/virgl/virglrenderer.h"
        sed -i 's|^#define VIRGL_EXPORT.*$|#define VIRGL_EXPORT __declspec(dllimport)|' "${VIRGL_HDR}"
        grep -n '^#define VIRGL_EXPORT' "${VIRGL_HDR}"

     - name: Pre-install Python dependencies
       shell: msys2 {0}
       run: |
        python3 -m pip install pycotap sphinx sphinxcontrib-serializinghtml

     - name: Configure build
       working-directory: ./build
       shell: msys2 {0}
       run: |
        echo "Configuring build"
        CFLAGS="${CFLAGS//-flto=auto/}"
        CXXFLAGS="${CXXFLAGS//-flto=auto/}"
        LDFLAGS="${LDFLAGS//-flto=auto/}"
        sed -i 's/-Wl,--high-entropy-va/-Wl,--disable-high-entropy-va/g' ../${{ env.qemu_src_dir }}/meson.build
        ../${{ env.qemu_src_dir }}/configure --target-list="x86_64-softmmu,i386-softmmu" --disable-guest-agent-msi --disable-guest-agent --disable-werror --disable-stack-protector --disable-rust --enable-whpx --enable-virglrenderer --enable-opengl --enable-gtk --enable-debug --enable-sdl --enable-sdl-image --enable-slirp --enable-spice --prefix=$(pwd)/../install_dir --extra-cflags="-O2" --extra-ldflags="-Wl,--disable-high-entropy-va -Wl,--disable-dynamicbase -Wl,--image-base,0x400000"

     - name: Compile build
       working-directory: ./build
       shell: msys2 {0}
       run: |
        echo "Compiling Build"
          ninja -j$(nproc)

     - name: Compile Host Openglide
       working-directory: ./build
       shell: msys2 {0}
       run: |
        git submodule update --init --recursive
        cd ../wrappers/extra/openglide
        bash ./bootstrap
        mkdir ../build && cd ../build
        ../openglide/configure --disable-sdl && make
        mkdir -p ../../../install_dir
        cp -v .libs/libglide2x.dll ../../../install_dir/libglide2x.dll
        cp -v .libs/libglide3x.dll ../../../install_dir/libglide3x.dll
        cp -v ../../../MINGW-packages/openglide-3dfx/q3dlog.sh ../../../install_dir/q3dlog.sh

     - name: Installing build
       working-directory: ./build
       shell: msys2 {0}
       run: |
        echo "Installing build to output"
        make install
        cd ../install_dir
          bash ../scripts/dll_extract
          if [ -d ../build/bin ]; then
            mkdir -p bin
            cp -rv ../build/bin/* ./bin/
          else
            echo "No build/bin directory found; skipping bin staging"
          fi
        bash ../scripts/sign_binary
        cat <<EOF > version.txt
        QEMU-3dfx-arch (Windows Build)
        =================================================
        GitHub Actions Artifact Build
        ${{ env.branch }} Branch
        Version ${{ env.buildver }}
        Built using ${MSYSTEM} 
        EOF
        unix2dos version.txt build-timestamp.txt
        echo "Finished build at $(date)"

     - name: Uploading build
       uses: actions/upload-artifact@v4
       with:
        name: bin-windows-mingw64-${{ env.buildver }}-artifact
        path: ./install_dir

