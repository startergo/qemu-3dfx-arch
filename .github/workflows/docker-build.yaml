name: Build Docker Cross branch

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish release asset
        required: false
        default: false
        type: boolean
  push:
    branches:
      - test-experiments

jobs:
  docker-cross-windows:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build \
          --build-arg QEMU_REF=master \
          --build-arg VIRGL_HELPER_REF=master \
          --build-arg PRIMARY_PATCH=00-qemu110x-mesa-glide.patch \
          --build-arg ENABLE_QEMU_EXP=1 \
          -t qemu-3dfx-win-cross .

    - name: Extract build output
      run: |
        mkdir -p output
        docker run --rm -v "${PWD}/output:/mnt/output" qemu-3dfx-win-cross

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: bin-windows-docker-head-artifact
        path: ./output

  Release:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true'
    needs:
      - docker-cross-windows
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Pack release asset
      run: |
        set -euxo pipefail
        cd artifacts
        zip -qry ../bin-windows-docker-head-artifact.zip bin-windows-docker-head-artifact

    - name: Publish rolling release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly-docker-head
        name: Nightly docker head
        prerelease: true
        make_latest: false
        generate_release_notes: false
        files: |
          bin-windows-docker-head-artifact.zip